    include_bleed: false
    include_crop_marks: false
    include_playtest_watermark: true
    watermark_text: "CUSTOM PLAYTEST — NOT FOR SALE"
    allow_placeholder_art: true
    filename_template: "{{collector_number}}_{{slug_name}}.jpg"

  review_png:
